<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
    }
    .nav-wrapper {
      background: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .nav {
      list-style: none;
      margin: 0;
      padding: 0 1.5rem;
      display: flex;
      align-items: stretch;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
    }
    .nav > .nav-item {
      position: relative;
    }
    .nav-link {
      display: block;
      padding: 1rem 1.25rem;
      color: #eee;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover {
      background: #2d2d2d;
      color: #fff;
    }
    .nav-item.has-children > .nav-link::after {
      content: '';
      display: inline-block;
      margin-left: 0.35em;
      border: 4px solid transparent;
      border-top-color: currentColor;
      vertical-align: middle;
    }
    /* Dropdown */
    .nav-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 220px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      list-style: none;
      margin: 0;
      padding: 0.5rem 0;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
      z-index: 100;
    }
    .nav-item:hover > .nav-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .nav-dropdown .nav-link {
      color: #333;
      padding: 0.6rem 1.25rem;
      font-weight: 400;
      white-space: nowrap;
    }
    .nav-dropdown .nav-link:hover {
      background: #f0f0f0;
      color: #1a1a1a;
    }
    /* Nested dropdown (level 2+) */
    .nav-dropdown .nav-item {
      position: relative;
    }
    .nav-dropdown .nav-item.has-children > .nav-link::after {
      content: '';
      position: absolute;
      right: 1rem;
      top: 50%;
      margin-top: -3px;
      border: 4px solid transparent;
      border-left-color: currentColor;
      border-top-color: transparent;
    }
    .nav-dropdown .nav-dropdown {
      top: 0;
      left: 100%;
      margin-left: 4px;
    }
    .nav-dropdown .nav-item:hover > .nav-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .nav-dropdown .nav-item:hover > .nav-dropdown {
      transform: translateX(0);
    }
    .nav-dropdown .nav-dropdown {
      transform: translateX(-4px);
    }
    /* Loading / error */
    .nav-message {
      padding: 1rem 1.5rem;
      color: #666;
      font-size: 0.9rem;
    }
    .nav-message.error {
      color: #c00;
    }
    .nav-loading {
      padding: 1rem 1.5rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header class="nav-wrapper">
    <ul class="nav" id="nav" role="menubar">
      <li class="nav-loading" role="none">Loading menu…</li>
    </ul>
  </header>
  <main style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
    <p>Hover over a top-level item to open its submenu. Nested items open to the right.</p>
  </main>

  <script>
    const API_URL = 'https://na1-sandbox.api.commerce.adobe.com/TENANT_ID/graphql';
    const HEADERS = {
      'Content-Type': 'application/json',
      'ac-view-id': 'na',
      'AC-Price-Book-ID': 'global',
      'AC-Scope-Locale': 'en-US',
    };
    const QUERY = `query Navigation($family: String!) {
  navigation(family: $family) {
    slug
    name
    children {
      slug
      name
      children {
        slug
        name
        children {
          name
        }
      }
    }
  }
}`;

    function buildNavItem(node, isTopLevel) {
      const hasChildren = node.children && node.children.length > 0;
      const slug = node.slug || '';
      const name = node.name || 'Unnamed';
      const href = slug ? `#/${slug}` : '#';

      const li = document.createElement('li');
      li.className = 'nav-item' + (hasChildren ? ' has-children' : '');
      li.setAttribute('role', 'none');

      const a = document.createElement('a');
      a.className = 'nav-link';
      a.href = href;
      a.textContent = name;
      a.setAttribute('role', isTopLevel ? 'menuitem' : 'menuitem');
      li.appendChild(a);

      if (hasChildren) {
        const dropdown = document.createElement('ul');
        dropdown.className = 'nav-dropdown';
        dropdown.setAttribute('role', 'menu');
        node.children.forEach(child => {
          dropdown.appendChild(buildNavItem(child, false));
        });
        li.appendChild(dropdown);
      }

      return li;
    }

    function renderNav(items) {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      nav.setAttribute('role', 'menubar');

      if (!items || items.length === 0) {
        const msg = document.createElement('li');
        msg.className = 'nav-message';
        msg.textContent = 'No menu items.';
        msg.setAttribute('role', 'none');
        nav.appendChild(msg);
        return;
      }

      items.forEach(item => {
        nav.appendChild(buildNavItem(item, true));
      });
    }

    function showError(message) {
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      const li = document.createElement('li');
      li.className = 'nav-message error';
      li.textContent = message;
      li.setAttribute('role', 'none');
      nav.appendChild(li);
    }

    async function loadNavigation() {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: HEADERS,
          body: JSON.stringify({
            query: QUERY,
            operationName: 'Navigation',
            variables: { family: 'parts-catalog' }, // another family example: 'seasonal-catalog'
          }),
        });

        const json = await res.json();

        if (json.errors && json.errors.length) {
          showError('GraphQL error: ' + (json.errors[0].message || JSON.stringify(json.errors[0])));
          return;
        }

        const items = json.data?.navigation;
        if (items == null) {
          showError('Unexpected response: no navigation data.');
          return;
        }

        renderNav(items);
      } catch (err) {
        showError('Failed to load menu: ' + err.message + '. (CORS may block requests from file:// or this origin.)');
      }
    }

    loadNavigation();
  </script>
</body>
</html>
